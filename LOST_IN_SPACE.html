<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOST IN SPACE</title>
    <link rel="stylesheet" href="space.css">
    <style>
    
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; }
        .universe { position: absolute; width: 400vw; height: 300vh; will-change: transform; z-index: 1; }
        .lost-item { 
            position: absolute; 
            width: 220px; 
            color: white; 
            cursor: grab; 
            z-index: 10;
            user-select: none;
        }
        .lost-item img { width: 100%; pointer-events: none; }
        .caption { pointer-events: none; }
      
        canvas { 
            position: fixed; 
            top: 0; 
            left: 0; 
            pointer-events: none; 
            z-index: 5; 
        }
    </style>
</head>
<body>

    <div class="universe">
        <div class="lost-item">
            <div class="graphic"><img src="abcd.png" alt="분실물"></div>
            <div class="caption">
                <div class="title">test-#1</div>
                <div class="text">옛 추억이 기록된 CD이다. <br> 거의 훼손되었지만, 여전히 누군가의 소중한 기억을 담고 있을 것이다.</div>
            </div>
        </div>

        <div class="lost-item">
            <div class="graphic"><img src="smartphone.png" alt="분실물"></div>
            <div class="caption">
                <div class="title">test-#2</div>
                <div class="text">케이스 안에 증명사진이 잔뜩 들어 있는 휴대폰이다. <br> 주인은 술에 취해 잃어버린 것도 까맣게 잊은 것 같다. </div>
            </div>
        </div>

         <div class="lost-item">
            <div class="graphic"><img src="B.png" alt="분실물"></div>
            <div class="caption">
                <div class="title">test-#3</div>
                <div class="text">귀여운 곰돌이 인형이다. <br> 어린 아이의 품 속에서 떨어진 것일까...</div>
            </div>
        </div>

        <div class="lost-item">
            <div class="graphic"><img src="C.png" alt="분실물"></div>
            <div class="caption">
                <div class="title">test-#3</div>
                <div class="text"> 아름다운 꽃이다. <br> 전해지지 못한 마음일까? 아니면 버린 마음일까?</div>
            </div>
        </div>

        <div class="lost-item">
            <div class="graphic"><img src="bike.png" alt="분실물"></div>
            <div class="caption">
                <div class="title">test-#4</div>
                <div class="text">허름해 보이는 자전거이다. <br> 왜 항상 한국인들은 자전거만 훔쳐갈까?</div>
            </div>
        </div>
    </div>

<script>

window.onload = function() {
    const universe = document.querySelector('.universe');
    const items = document.querySelectorAll('.lost-item');
    const canvas = document.createElement('canvas');
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const spaceWidth = window.innerWidth * 7; 
    const spaceHeight = window.innerHeight * 3;

    let stars = [];
    let frontStars = []; 
    let ripples = []; 
    let glitches = []; 

    let translateX = -window.innerWidth, translateY = -window.innerHeight;
    let velX = 0, velY = 0, isDraggingBoard = false;
    let activeItems = new Set(); 
    let draggedItem = null;      
    let lastX, lastY, mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    let startX, startY, offsetDragX = 0, offsetDragY = 0, topZIndex = 100;

    // 별에 섞어줄 세련된 색상들 (흰색 비중 높게)
    const starColors = ['#ffffff', '#ffffff', '#ffffff', '#e0eaff', '#f4eaff', '#fff5e0'];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        stars = Array.from({length: 150}, () => ({
            x: Math.random() * spaceWidth, y: Math.random() * spaceHeight,
            vx: (Math.random() - 0.5) * 0.02, vy: (Math.random() - 0.5) * 0.02,
            baseSize: Math.random() * 1.2 + 0.2, 
            size: 0, 
            phase: Math.random() * Math.PI * 2,
            color: starColors[Math.floor(Math.random() * starColors.length)], 
            sx: 0, sy: 0, isConstellation: false
        }));
        frontStars = Array.from({length: 8}, () => ({
            x: Math.random() * spaceWidth, y: Math.random() * spaceHeight,
            size: Math.random() * 40 + 30, color: '#ffffff', opacity: 0.08, sx: 0, sy: 0
        }));
    }
    window.addEventListener('resize', resize);
    resize();

    function triggerLocalGlitch(x, y, isNearItem = false) {
        const count = isNearItem ? 3 : 1; 
        for (let i = 0; i < count; i++) {
            glitches.push({
                x: x + (Math.random() - 0.5) * (isNearItem ? 120 : 200),
                y: y + (Math.random() - 0.5) * (isNearItem ? 120 : 200),
                w: isNearItem ? Math.random() * 40 + 10 : Math.random() * 110 + 30, 
                h: isNearItem ? Math.random() * 2 + 1 : Math.random() * 12 + 2,
                life: 0.7,
                speed: 0.04,
                jitter: isNearItem ? 3 : 7
            });
        }
    }

    const itemStates = Array.from(items).map(item => {
        // [수정] 아이템 크기 범위를 0.8 ~ 1.5 정도로 줄임 (기존 1.5 ~ 2.5)
        const itemSize = 0.8 + Math.random() * 0.7; 
        const state = {
            element: item, scale: itemSize,
            x: Math.random() * (spaceWidth - 800) + 400,
            y: Math.random() * (spaceHeight - 800) + 400,
            vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3
        };
        
        item.addEventListener('mousedown', (e) => {
            e.stopPropagation();
            draggedItem = state;
            startX = e.clientX; startY = e.clientY;
            offsetDragX = (e.clientX - translateX) - state.x;
            offsetDragY = (e.clientY - translateY) - state.y;
            item.style.zIndex = ++topZIndex;
        });

        item.addEventListener('mouseup', (e) => {
            e.stopPropagation();
            const dist = Math.hypot(e.clientX - startX, e.clientY - startY);
            if (dist < 5) { 
                if (activeItems.has(state)) {
                    activeItems.delete(state);
                    item.classList.remove('active');
                    item.style.filter = "none";
                    item.style.boxShadow = "none";
                } else {
                    activeItems.add(state);
                    item.classList.add('active');
                    item.style.setProperty('--neon-color', '#ffffff');
                    item.style.filter = "drop-shadow(0 0 10px rgba(255,255,255,0.8))";
                    createRipple(e.clientX, e.clientY, 'rgba(255,255,255,0.4)');
                }
            }
            draggedItem = null;
        });
        return state;
    });

    window.addEventListener('mousedown', (e) => {
        if (!e.target.closest('.lost-item')) {
            isDraggingBoard = true;
            lastX = e.clientX; lastY = e.clientY;
            createRipple(e.clientX, e.clientY, 'rgba(200,200,200,0.2)'); 
        }
    });

    function createRipple(x, y, color) {
        ripples.push({ x, y, r: 0, opacity: 1, color, speed: 2 });
    }

    window.addEventListener('mousemove', (e) => {
        mouseX = e.clientX; mouseY = e.clientY;

        if (Math.random() > 0.88) {
            let nearItem = false;
            items.forEach(item => {
                const rect = item.getBoundingClientRect();
                const dist = Math.hypot(e.clientX - (rect.left + rect.width/2), e.clientY - (rect.top + rect.height/2));
                // 아이템 크기가 작아졌으니 감지 반경도 살짝 좁힘
                if (dist < 150) nearItem = true;
            });
            triggerLocalGlitch(e.clientX, e.clientY, nearItem);
        }

        if (draggedItem) {
            draggedItem.x = (e.clientX - translateX) - offsetDragX;
            draggedItem.y = (e.clientY - translateY) - offsetDragY;
        }

        if (isDraggingBoard) {
            const dx = e.clientX - lastX, dy = e.clientY - lastY;
            translateX += dx; translateY += dy;
            velX = dx; velY = dy;
        }
        lastX = e.clientX; lastY = e.clientY;
    });

    window.addEventListener('mouseup', () => { isDraggingBoard = false; draggedItem = null; });

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (let s of stars) {
            s.x += s.vx; s.y += s.vy;
            s.sx = (s.x + translateX * 0.3) % window.innerWidth;
            s.sy = (s.y + translateY * 0.3) % window.innerHeight;
            if (s.sx < 0) s.sx += window.innerWidth; if (s.sy < 0) s.sy += window.innerHeight;
            s.phase += 0.03; s.isConstellation = false;
        }

        activeItems.forEach(activeItem => {
            const rect = activeItem.element.getBoundingClientRect();
            const itemCX = rect.left + rect.width / 2;
            const itemCY = rect.top + rect.height / 2; 
            const nearbyStars = stars
                .filter(s => Math.hypot(itemCX - s.sx, itemCY - s.sy) < 500)
                .sort((a, b) => Math.hypot(itemCX - a.sx, itemCY - a.sy) - Math.hypot(itemCX - b.sx, itemCY - b.sy))
                .slice(0, 7);

            if(nearbyStars.length > 1) {
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.beginPath(); ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 2.0; ctx.globalAlpha = 0.12;
                ctx.moveTo(itemCX, itemCY);
                nearbyStars.forEach(s => { ctx.lineTo(s.sx, s.sy); s.isConstellation = true; });
                ctx.stroke();
                ctx.beginPath(); ctx.lineWidth = 0.6; ctx.globalAlpha = 0.35;
                ctx.moveTo(itemCX, itemCY);
                nearbyStars.forEach(s => ctx.lineTo(s.sx, s.sy));
                ctx.stroke();
                ctx.restore();
            }
        });

        glitches = glitches.filter(g => g.life > 0);
        glitches.forEach(g => {
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.globalAlpha = g.life * 0.4;
            const shift = (Math.random() - 0.5) * g.jitter;
            ctx.fillRect(g.x + shift, g.y, g.w, g.h);
            ctx.restore();
            g.life -= g.speed;
        });

        stars.forEach(s => {
            const twinkle = (Math.sin(s.phase) * 0.5 + 0.5);
            const targetSize = s.isConstellation ? s.baseSize * 1.5 : s.baseSize;
            s.size += (targetSize - s.size) * 0.1;
            ctx.save();
            ctx.fillStyle = s.color; 
            ctx.globalAlpha = (s.isConstellation ? 1.0 : twinkle) * 0.8;
            ctx.beginPath(); ctx.arc(s.sx, s.sy, s.size, 0, Math.PI * 2); ctx.fill();
            if(s.color !== '#ffffff') {
                ctx.shadowBlur = 5; ctx.shadowColor = s.color; ctx.fill();
            }
            ctx.restore();
        });

        ripples = ripples.filter(rp => rp.opacity > 0);
        ripples.forEach(rp => {
            rp.r += rp.speed; rp.opacity -= 0.015;
            ctx.beginPath(); ctx.arc(rp.x, rp.y, rp.r, 0, Math.PI * 2);
            ctx.strokeStyle = rp.color; ctx.globalAlpha = Math.max(0, rp.opacity);
            ctx.lineWidth = 1; ctx.stroke();
        });

        ctx.save();
        ctx.globalCompositeOperation = 'source-over';
        for (let fs of frontStars) {
            fs.sx = (fs.x + translateX * 2.8) % window.innerWidth;
            fs.sy = (fs.y + translateY * 2.8) % window.innerHeight;
            if (fs.sx < 0) fs.sx += window.innerWidth; if (fs.sy < 0) fs.sy += window.innerHeight;
            ctx.save();
            const grad = ctx.createRadialGradient(fs.sx, fs.sy, 0, fs.sx, fs.sy, fs.size);
            grad.addColorStop(0, `rgba(255,255,255,${fs.opacity})`);
            grad.addColorStop(1, 'transparent');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(fs.sx, fs.sy, fs.size, 0, Math.PI * 2); ctx.fill();
            ctx.restore();
        }
        ctx.restore();

        itemStates.forEach(state => {
            if (draggedItem !== state) { state.x += state.vx; state.y += state.vy; }
            const itemW = state.element.offsetWidth, itemH = state.element.offsetHeight;
            if (state.x < 0 || state.x > spaceWidth - itemW) state.vx *= -1;
            if (state.y < 0 || state.y > spaceHeight - itemH) state.vy *= -1;
            state.element.style.transform = `translate3d(${Math.round(state.x)}px, ${Math.round(state.y)}px, 0) scale(${state.scale})`;
            const caption = state.element.querySelector('.caption');
            if (caption) caption.style.transform = `scale(${1 / state.scale})`;
        });

        if (!isDraggingBoard && !draggedItem) {
            translateX -= (mouseX - window.innerWidth / 2) * 0.01;
            translateY -= (mouseY - window.innerHeight / 2) * 0.01;
            translateX += velX; translateY += velY;
            velX *= 0.95; velY *= 0.95;
        }
        const minX = -(spaceWidth - window.innerWidth), minY = -(spaceHeight - window.innerHeight);
        translateX = Math.min(0, Math.max(translateX, minX));
        translateY = Math.min(0, Math.max(translateY, minY));
        universe.style.transform = `translate3d(${Math.round(translateX)}px, ${Math.round(translateY)}px, 0)`;
        
        requestAnimationFrame(update);
    }
    update();
};
</script>


</body>
</html>
